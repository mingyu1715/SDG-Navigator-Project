<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SDG Project Entry</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f2f2f2;
      font-family: "Pretendard", "Noto Sans KR", sans-serif;
      color: #333;
    }
    .box {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 14px;
      padding: 20px;
      width: min(560px, 92vw);
    }
    code {
      background: #f5f5f5;
      padding: 2px 6px;
      border-radius: 6px;
    }
    a {
      color: #2f5cff;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>정적 배포 전환 완료</h1>
    <p>이 프로젝트는 백엔드 없이 정적 파일로 실행됩니다.</p>
    <p>실행: <code>npm start</code></p>
    <p>접속: <a href="http://localhost:3000">http://localhost:3000</a></p>
    <p>Vercel 출력 디렉터리: <code>public</code></p>
  </div>
</body>
</html>
