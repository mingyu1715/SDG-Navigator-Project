<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drag Circular Cards</title>

  <style>
    * {
      box-sizing: border-box;
      user-select: none;
      -webkit-user-select: none;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #ececec;
      font-family: Arial, sans-serif;
    }

    .stage {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      cursor: grab;
      background: #ececec;
    }

    .stage:active {
      cursor: grabbing;
    }

    /*
      실제로 회전시키는 덩어리가 아님.
      카드들을 담아두는 레이어일 뿐.
    */
    .cards-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .card-item {
      position: absolute;
      left: 0;
      top: 0;
      width: 220px;
      height: 320px;
      transform-origin: center center;
      will-change: transform, opacity;
    }

    .card {
      width: 100%;
      height: 100%;
      background: #d9d9d9;
      border: 2px solid #b8b8b8;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.12);
    }

    .label {
      position: absolute;
      left: 50%;
      top: -60px;
      transform: translateX(-50%);
      transform-origin: center center;
      text-align: center;
      line-height: 1.2;
      white-space: nowrap;
      color: #666;
      font-size: 14px;
      letter-spacing: 0.2px;
    }

    .label strong {
      display: block;
      font-size: 18px;
      font-weight: 600;
      color: #4d4d4d;
      margin-bottom: 2px;
    }

    /*
      밑에 살짝 보이는 원호 가이드
    */
    .arc {
      position: absolute;
      left: 50%;
      top: 145%;
      width: 1800px;
      height: 1800px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      border: 4px solid rgba(0, 0, 0, 0.18);
      pointer-events: none;
    }

    .shadow {
      position: absolute;
      left: 50%;
      bottom: 52px;
      transform: translateX(-50%);
      width: 900px;
      height: 56px;
      border-radius: 50%;
      background: radial-gradient(
        ellipse at center,
        rgba(0, 0, 0, 0.16) 0%,
        rgba(0, 0, 0, 0.06) 45%,
        rgba(0, 0, 0, 0) 72%
      );
      filter: blur(12px);
      pointer-events: none;
    }

    /*
      드래그 입력용 투명 레이어
    */
    .drag-proxy {
      position: absolute;
      inset: 0;
      z-index: -100;
      background: transparent;
    }
  </style>
</head>
<body>
  <div class="stage" id="stage">
    <div class="cards-layer" id="cardsLayer"></div>
    <div class="arc"></div>
    <div class="shadow"></div>
    <div class="drag-proxy" id="dragProxy"></div>
  </div>

  <!-- GSAP core -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
  <!-- GSAP Draggable -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/Draggable.min.js"></script>

  <script>
    const data = [
      { name: "fermin guerrero", country: "uruguay" },
      { name: "kike farias", country: "brazil" },
      { name: "homa delvaray", country: "iran" },
      { name: "victor soma", country: "poland" },
      { name: "hellepanos", country: "greece" },
      { name: "kouglof", country: "france" },
      { name: "ryan volt", country: "canada" },
      { name: "mira tan", country: "singapore" }
    ];

    const stage = document.getElementById("stage");
    const cardsLayer = document.getElementById("cardsLayer");
    const dragProxy = document.getElementById("dragProxy");

    const state = {
      rotation: 0,      // 전체 진행 각도
      dragRotation: 0,  // 드래그로 바뀌는 누적 각도
    };

    const config = {
      cardWidth: 220,
      cardHeight: 320,

      // 중심을 화면 밖 아래에 둔다
      centerX: () => window.innerWidth * 0.5,
      centerY: () => window.innerHeight * 1.45,

      radius: () => Math.min(window.innerWidth, window.innerHeight) * 0.86,

      /*
        baseStart:
        첫 카드 시작 위치.
        0도는 위쪽, 180도는 아래쪽이라고 보면 됨.
        현재는 위쪽 반원 근처가 보이도록 설정
      */
      baseStart: -62,

      // 카드 간 간격
      gap: 18,

      /*
        카드가 직립하지 않고
        원 궤도를 따라 기울도록 하는 보정값
      */
      tangentOffset: 90,

      /*
        화면 중앙 아래쪽이 가장 강조되도록 depth 계산에 사용
      */
      focusAngle: 0
    };

    function mod(n, m) {
      return ((n % m) + m) % m;
    }

    const ringSlots = Math.round(360 / config.gap);

    const items = Array.from({ length: ringSlots }, (_, index) => {
      const person = data[mod(index, data.length)];
      const el = document.createElement("div");
      el.className = "card-item";
      el.dataset.index = index;
      el.dataset.baseAngle = config.baseStart + index * config.gap;

      const card = document.createElement("div");
      card.className = "card";

      const label = document.createElement("div");
      label.className = "label";
      label.innerHTML = `
        <strong>${person.name}</strong>
        <span>${person.country}</span>
      `;

      el.appendChild(card);
      el.appendChild(label);
      cardsLayer.appendChild(el);

      return {
        el,
        label,
        baseAngle: config.baseStart + index * config.gap
      };
    });

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function normalizeAngle(deg) {
      let a = deg % 360;
      if (a > 180) a -= 360;
      if (a < -180) a += 360;
      return a;
    }

    function render() {
      const cx = config.centerX();
      const cy = config.centerY();
      const radius = config.radius();

      items.forEach((item, i) => {
        const angleDeg = item.baseAngle + state.rotation;
        const angleRad = angleDeg * Math.PI / 180;

        // 카드 중심 위치
        const x = cx + Math.sin(angleRad) * radius;
        const y = cy - Math.cos(angleRad) * radius;

        /*
          핵심:
          카드 자체도 접선 방향 기준으로 회전
          그냥 그룹이 돌면 안 되고
          카드 각도가 위치에 따라 다시 계산되어야 한다.
        */
        const tangentRotation = angleDeg;

        /*
          앞쪽/뒤쪽 느낌
          - 아래쪽 기준으로 크게/진하게
          - 위쪽으로 갈수록 작고 흐리게
        */
        const focusDiff = normalizeAngle(angleDeg - config.focusAngle);
        const depthFactor = 1 - clamp(Math.abs(focusDiff) / 120, 0, 1);

        const scale = 0.82 + depthFactor * 0.24;
        const opacity = 0.38 + depthFactor * 0.62;
        const zIndex = Math.round(depthFactor * 1000);

        /*
          카드 중심 맞추기 위해 반너비/반높이 빼기
        */
        const tx = x - config.cardWidth / 2;
        const ty = y - config.cardHeight / 2;

        item.el.style.transform = `
          translate(${tx}px, ${ty}px)
          rotate(${tangentRotation}deg)
          scale(${scale})
        `;
        item.el.style.opacity = opacity;
        item.el.style.zIndex = zIndex;

        /*
          텍스트는 카드와 완전히 같이 돌면 읽기 너무 불편하니
          일부 역보정
        */
        item.label.style.transform = `translateX(-50%) rotate(${-tangentRotation}deg)`;
      });
    }

    render();
    window.addEventListener("resize", render);

    /*
      드래그 -> 회전값 매핑
      x를 직접 UI에 쓰는 게 아니라, x 변화량을 각도로 바꿔서 사용
    */
    const inertia = {
      velocityX: 0,
      lastX: 0,
      lastT: 0,
      rafId: null
    };
    let snapTween = null;

    function stopInertia() {
      if (inertia.rafId !== null) {
        cancelAnimationFrame(inertia.rafId);
        inertia.rafId = null;
      }
    }

    function stopSnap() {
      if (snapTween) {
        snapTween.kill();
        snapTween = null;
      }
    }

    function snapToClosestCard() {
      const currentRotation = state.rotation;
      let closestDiff = Infinity;
      let targetRotation = currentRotation;

      items.forEach((item) => {
        const diff = normalizeAngle(item.baseAngle + currentRotation - config.focusAngle);
        const absDiff = Math.abs(diff);

        if (absDiff < closestDiff) {
          closestDiff = absDiff;
          targetRotation = currentRotation - diff;
        }
      });

      const targetX = targetRotation / 0.18;
      stopSnap();

      snapTween = gsap.to(dragger.target, {
        x: targetX,
        duration: 0.35,
        ease: "power2.out",
        onUpdate() {
          const x = gsap.getProperty(dragger.target, "x");
          state.rotation = x * 0.18;
          render();
        },
        onComplete() {
          snapTween = null;
        }
      });
    }

    function startInertia() {
      stopInertia();

      const decay = 0.90;
      const minSpeed = 0.01;

      const tick = () => {
        inertia.velocityX *= decay;

        if (Math.abs(inertia.velocityX) < minSpeed) {
          stopInertia();
          snapToClosestCard();
          return;
        }

        const nextX = gsap.getProperty(dragger.target, "x") + inertia.velocityX * 16;
        gsap.set(dragger.target, { x: nextX });
        state.rotation = nextX * 0.18;
        render();

        inertia.rafId = requestAnimationFrame(tick);
      };

      inertia.rafId = requestAnimationFrame(tick);
    }

    const dragger = Draggable.create(dragProxy, {
      type: "x",
      trigger: stage,
      onPress() {
        stopInertia();
        stopSnap();
        inertia.lastX = this.x;
        inertia.lastT = performance.now();
        inertia.velocityX = 0;
      },
      onDrag() {
        const now = performance.now();
        const dt = Math.max(now - inertia.lastT, 1);
        const dx = this.x - inertia.lastX;

        inertia.velocityX = dx / dt;
        inertia.lastX = this.x;
        inertia.lastT = now;

        state.rotation = this.x * 0.18;
        render();
      },
      onThrowUpdate() {
        state.rotation = this.x * 0.18;
        render();
      },
      onRelease() {
        startInertia();
      }
    })[0];
  </script>
</body>
</html>
