<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SDG Detail</title>
  <link rel="stylesheet" href="/css/main.css" />
</head>
<body class="detail-page">
  <main class="detail-wrap">
    <section class="detail-card" id="detailCard">
      <div class="detail-head">
        <div>
          <h1 class="detail-title" id="goalTitle">로딩 중...</h1>
          <p class="detail-sub" id="goalSub">SDG 목표 데이터를 불러오고 있습니다.</p>
        </div>
        <div class="goal-badge" id="goalBadge">-</div>
      </div>

      <div class="detail-body">
        <article class="detail-box">
          <h3>목표 설명</h3>
          <p id="goalDesc"></p>
        </article>

        <article class="detail-box">
          <h3>간단 기능</h3>
          <ul id="goalFeatures"></ul>
        </article>

        <article class="detail-box">
          <h3>백엔드 상태</h3>
          <p id="backendStatus">연결 중...</p>
        </article>
      </div>

      <div class="detail-actions">
        <button class="btn primary" id="simulateBtn" type="button">샘플 액션 호출</button>
        <button class="btn ghost" id="backBtn" type="button">목록으로 돌아가기</button>
      </div>

      <p class="meta" id="visitMeta"></p>
    </section>
  </main>

  <script src="/js/sdg-detail.js"></script>
</body>
</html>
