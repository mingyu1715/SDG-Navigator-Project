<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SDG 04 | 문맹의 시선</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Pretendard:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="page-mark" aria-label="SDG 로고">SDG</div>
  <button class="back-btn" id="backBtn" type="button" aria-label="메인으로 돌아가기">←</button>

  <main class="page" id="pageRoot">
    <section class="hero" id="heroSection">
      <div class="hero-inner">
        <p class="goal-label">SDG GOAL 04</p>
        <h1>문맹의 시선</h1>
        <p class="subtitle">The Lens of Illiteracy</p>
        <p class="lead">
          같은 정보, 다른 세상.<br />
          누군가에게는 기회가 되는 문장이,<br />
          누군가에게는 의미 없는 기호일 뿐입니다.
        </p>

        <p class="hint">국가를 선택하여 시작하세요</p>
        <div class="country-grid" id="heroCountryGrid"></div>
      </div>
    </section>

    <section class="experience hidden" id="experienceSection">
      <header class="exp-header">
        <button class="lang-toggle" id="langToggle" type="button">English</button>
      </header>

      <div class="content">
        <section class="country-info card">
          <p class="overline">선택된 국가</p>
          <h2 id="countryNameKo">-</h2>
          <p id="countryMeta" class="muted">-</p>

          <div class="meter-wrap">
            <div class="meter-row">
              <span>문해율</span>
              <strong id="literacyRate">0%</strong>
            </div>
            <div class="meter-track">
              <div class="meter-fill" id="literacyFill"></div>
            </div>
          </div>
        </section>

        <section class="context card" id="contextMessage">-</section>

        <section class="sentence-nav">
          <span id="sentenceCount" class="muted">1 / 1</span>
          <div class="nav-buttons">
            <button id="prevSentence" class="nav-btn" type="button" aria-label="이전 문장">‹</button>
            <button id="nextSentence" class="nav-btn" type="button" aria-label="다음 문장">›</button>
          </div>
        </section>

        <section class="sentence-card card">
          <div class="badge-line">
            <span id="categoryBadge" class="category">교육</span>
          </div>
          <p id="distortedText" class="distorted">-</p>
          <p id="impactText" class="impact hidden">-</p>
        </section>

        <section class="compare card">
          <h3>다른 국가와 비교해보세요</h3>
          <div class="country-grid" id="compareCountryGrid"></div>
        </section>

        <section class="stats">
          <article class="stat card"><strong>773M</strong><span>전 세계 문맹 성인 인구</span></article>
          <article class="stat card"><strong>2/3</strong><span>문맹 인구 중 여성 비율</span></article>
          <article class="stat card"><strong>250M</strong><span>기초 문해력 부족 아동</span></article>
        </section>

        <section class="closing">
          <p>"글을 읽을 수 없다는 것은 세상으로부터 단절되는 것입니다."</p>
        </section>
    
      </div>
    </section>
  </main>

  <div class="page-actions">
    <button id="fullscreenBtn" class="text-link" type="button">fullscreen</button>
    <span class="text-link">·</span>
    <a href="https://ncsd.go.kr/" target="_blank" rel="noopener noreferrer" class="text-link">about sdg</a>
  </div>

  <script src="./script.js"></script>
</body>
</html>
