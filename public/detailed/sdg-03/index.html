<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SDG 03 Detail</title>
  <link rel="stylesheet" href="../common/detail-common.css" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body class="detail-page" data-goal="03">
  <main class="detail-wrap">
    <section class="detail-card">
      <div class="detail-top">
        <div>
          <p class="goal-label" id="goalLabel">SDG GOAL 03</p>
          <h1 class="goal-title" id="goalTitle">Loading...</h1>
          <p class="goal-sub" id="goalSub">데이터를 불러오는 중입니다.</p>
        </div>
        <div class="goal-badge" id="goalBadge">3</div>
      </div>

      <div class="detail-grid">
        <article class="box">
          <h3>목표 설명</h3>
          <p id="goalDesc"></p>
        </article>

        <article class="box">
          <h3>세부 기능</h3>
          <ul id="goalFeatures"></ul>
        </article>

        <article class="box">
          <h3>백엔드 상태</h3>
          <p id="backendStatus">API 연결 중...</p>
        </article>
      </div>

      <div class="detail-actions">
        <button class="btn primary" id="simulateBtn" type="button">샘플 액션 호출</button>
        <button class="btn ghost" id="backBtn" type="button">메인으로 돌아가기</button>
      </div>

      <p class="meta" id="visitMeta"></p>
    </section>
  </main>

  <script src="../common/detail-common.js"></script>
  <script src="./script.js"></script>
</body>
</html>
