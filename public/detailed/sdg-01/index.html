<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SDG 1 | 생존의 로또</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="experience" id="experience">

    <a class="page-mark" href="/index.html" aria-label="메인으로 이동">SDG</a>
    <div class="page-actions">
      <a href="/index.html" class="text-link">main</a>
      <span class="text-link">·</span>
      <a href="https://ncsd.go.kr/" target="_blank" rel="noopener noreferrer" class="text-link">about sdg</a>
    </div>

    <div class="space-layer">
      <div class="starfield starfield-a"></div>
      <div class="starfield starfield-b"></div>
      <div class="nebula nebula-a"></div>
      <div class="nebula nebula-b"></div>
    </div>

    <main class="experience-stage">
      <section class="globe-panel">
        <div class="globe-frame">
          <div class="orbit orbit-a"></div>
          <div class="orbit orbit-b"></div>
          <canvas id="globeCanvas" aria-label="3D globe simulation"></canvas>

          <div class="globe-overlay">
            <div class="status-chip" id="statusChip">생존의 로또</div>
            <div class="target-readout" id="targetReadout">
              버튼을 누르면 지구 반대편의 삶이 시작됩니다.
            </div>
          </div>
        </div>

        <div class="cta-wrap">
          <button class="launch-button" id="launchButton" type="button">
            나의 새로운 삶 시작하기
          </button>
        </div>
      </section>

      <aside class="result-panel" id="resultPanel" aria-live="polite">
        <div class="panel-shell">
          <div class="panel-top">
            <div class="panel-title-wrap">
              <span class="panel-kicker">📍 선택 지역</span>
              <h2 id="resultTitle">아직 결과가 선택되지 않았습니다</h2>
            </div>
            <button class="panel-close" id="panelCloseButton" type="button" aria-label="상세 패널 닫기">×</button>
          </div>

          <div class="panel-content">
            <p class="panel-summary" id="resultSummary">핵심 생존 지표만 간단히 보여줍니다.</p>

            <div class="fact-list">
              <article class="fact-item">
                <span class="fact-label">태어난 곳</span>
                <strong class="fact-value" id="birthPlace">-</strong>
                <span class="fact-note" id="regionNote">무작위로 선택된 출생 지역입니다.</span>
              </article>

              <article class="fact-item">
                <span class="fact-label">하루 생계 가능 금액</span>
                <strong class="fact-value" id="incomeTier">-</strong>
                <span class="fact-note" id="incomeNote">하루 세 끼 기준 식사 가능 수준</span>
              </article>

              <article class="fact-item">
                <span class="fact-label">물 접근성</span>
                <strong class="fact-value" id="waterAccess">-</strong>
                <span class="fact-note" id="waterNote">식수를 얻기 위해 매일 써야 하는 시간</span>
              </article>
            </div>

            <article class="reality-block">
              <span class="fact-label">오늘의 현실</span>
              <p class="reality-text" id="narrative">결과를 선택하면 이곳에 현실 설명이 표시됩니다.</p>
            </article>

            <div class="panel-actions">
              <button class="secondary-button" id="rerollButton" type="button">
                다른 삶 다시 보기
              </button>
              <a class="text-link" href="/index.html">메인으로 돌아가기</a>
            </div>
          </div>
        </div>
      </aside>
    </main>
  </div>

  <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
  <script src="./script.js"></script>
</body>
</html>
