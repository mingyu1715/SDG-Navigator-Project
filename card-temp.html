<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SDG Text Card Temp</title>
  <style>
    :root {
      --bg: #ececec;
      --card: #e5243b;
      --text: #ffffff;
      --sub: rgba(255, 255, 255, 0.84);
      --line: rgba(255, 255, 255, 0.3);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 18% 22%, rgba(255,255,255,0.6), transparent 34%),
        radial-gradient(circle at 78% 78%, rgba(0,0,0,0.06), transparent 42%),
        var(--bg);
      font-family: "Pretendard", "Noto Sans KR", sans-serif;
      color: #2b2b2b;
      padding: 24px;
    }

    .wrap {
      display: grid;
      gap: 12px;
      justify-items: center;
      width: 100%;
      max-width: 1300px;
    }

    .hint {
      font-size: 12px;
      color: #7a7a7a;
      letter-spacing: 0.03em;
    }

    .cards {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 14px;
      justify-items: center;
    }

    .card {
      width: 250px;
      height: 360px;
      background: linear-gradient(160deg, color-mix(in srgb, var(--card) 85%, #fff) 0%, var(--card) 62%);
      padding: clamp(20px, 4.2vw, 34px);
      color: var(--text);
      position: relative;
      overflow: hidden;
      box-shadow: 0 26px 52px rgba(0, 0, 0, 0.2);
    }

    .card::before,
    .card::after {
      content: "";
      position: absolute;
      border: 1px solid var(--line);
      border-radius: 999px;
      pointer-events: none;
    }

    .card::before {
      width: 72%;
      height: 72%;
      right: -16%;
      top: -12%;
    }

    .card::after {
      width: 54%;
      height: 54%;
      left: -18%;
      bottom: -20%;
    }

    .goal-no {
      margin: 0;
      font-size: 92px;
      line-height: 0.86;
      font-weight: 760;
      letter-spacing: -0.04em;
    }

    .goal-title{
      max-width: 85%;
      font-size: 30px;
      line-height: 1.04;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .goal-sub {
      margin: 8px 0 0;
      font-size: 8px;
      color: rgba(255, 255, 255, 0.92);
    }

    .desc {
      margin: clamp(18px, 4.8vw, 34px) 0 0;
      font-size: 7px;
      line-height: 1.45;
      max-width: 88%;
      color: rgba(255, 255, 255, 0.9);
    }

    .meta {
      position: absolute;
      left: clamp(18px, 4vw, 34px);
      right: clamp(18px, 4vw, 34px);
      bottom: clamp(16px, 3.6vw, 28px);
      display: flex;
      justify-content: space-between;
      font-size: 7px;
      color: rgba(255, 255, 255, 0.88);
      letter-spacing: 0.03em;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hint">임시 텍스트 카드 디자인 (아이콘 없음)</div>
    <section class="cards" id="cards"></section>
  </div>
  <!--기본 30px-->
  <script>
    const sdg = [
      { color: "#E5243B", title: "NO POVERTY", sub: "빈곤 퇴치", detailed: "취약계층 기본생활 보장과 안전망 강화로 빈곤의 악순환을 줄입니다." },
      { color: "#DDA63A", title: "ZERO HUNGER", sub: "기아 종식", detailed: "안정적 식량 접근성과 영양 개선으로 기아와 영양 불균형을 해소합니다." },
      { color: "#4C9F38", title: "GOOD HEALTH", sub: "건강과 웰빙", detailed: "예방 중심 보건체계와 의료 접근성 개선으로 건강한 삶을 지원합니다." },
      { color: "#C5192D", title: "QUALITY EDUCATION", sub: "양질의 교육", detailed: "포용적 교육 기회 확대를 통해 학습격차를 줄이고 역량을 강화합니다.", titleSize: 27 },
      { color: "#FF3A21", title: "GENDER EQUALITY", sub: "성평등", detailed: "성별 차별과 폭력 감소를 통해 동등한 기회와 권리를 보장합니다.", titleSize: 28 },
      { color: "#26BDE2", title: "CLEAN WATER", sub: "깨끗한 물", detailed: "안전한 식수와 위생 환경 확보로 지속가능한 생활 기반을 만듭니다." },
      { color: "#FCC30B", title: "CLEAN ENERGY", sub: "에너지", detailed: "재생에너지 확대와 효율 개선으로 모두를 위한 에너지 전환을 촉진합니다." },
      { color: "#A21942", title: "DECENT WORK", sub: "양질의 일자리", detailed: "안전하고 공정한 노동환경을 통해 지속가능한 성장과 고용을 만듭니다." },
      { color: "#FD6925", title: "INDUSTRY INNOVATION", sub: "산업과 혁신", detailed: "회복력 있는 인프라와 기술 혁신으로 미래 경쟁력을 강화합니다.", titleSize: 24 },
      { color: "#DD1367", title: "REDUCED INEQUALITIES", sub: "불평등 완화", detailed: "소득과 기회 격차를 줄여 사회 참여의 공정성을 높입니다.", titleSize: 23 },
      { color: "#FD9D24", title: "SUSTAINABLE CITIES", sub: "지속가능 도시", detailed: "주거·교통·환경 개선을 통해 포용적이고 안전한 도시를 구축합니다.", titleSize: 22 },
      { color: "#BF8B2E", title: "RESPONSIBLE CONSUMPTION", sub: "책임 소비", detailed: "자원 순환과 폐기물 감축으로 지속가능한 소비·생산 체계를 확산합니다.", titleSize: 20 },
      { color: "#3F7E44", title: "CLIMATE ACTION", sub: "기후 행동", detailed: "감축과 적응 전략을 강화해 기후위기에 대한 회복력을 높입니다." },
      { color: "#0A97D9", title: "LIFE BELOW WATER", sub: "해양 생태", detailed: "해양 오염을 줄이고 바다 생태계를 보호해 지속가능성을 확보합니다.", titleSize: 24 },
      { color: "#56C02B", title: "LIFE ON LAND", sub: "육상 생태", detailed: "산림·토양·생물다양성 보호와 복원으로 육상 생태를 지킵니다." },
      { color: "#00689D", title: "PEACE JUSTICE", sub: "평화와 제도", detailed: "투명하고 책임 있는 제도 구축으로 사회 신뢰를 높입니다.", titleSize: 25 },
      { color: "#19486A", title: "PARTNERSHIPS", sub: "협력", detailed: "정부·기업·시민사회 협력을 통해 목표 이행 역량을 확장합니다.", titleSize: 21 }
    ];

    const cards = document.getElementById("cards");
    cards.innerHTML = sdg.map((item, i) => `
      <article class="card" style="--card:${item.color}">
        <p class="goal-no">${String(i + 1).padStart(2, "0")}</p>
        <h1 class="goal-title" style="${item.titleSize ? `font-size:${item.titleSize}px` : ""}">${item.title}</h1>
        <p class="goal-sub">${item.sub}</p>
        <p class="desc">${item.detailed}</p>
        <div class="meta">
          <span>SDG NAVIGATOR</span>
          <span>TEXT EDITION</span>
        </div>
      </article>
    `).join("");
  </script>
</body>
</html>
